{% extends "base.html" %}
{% block title %}{{ 'Varlık Düzenle' if asset else 'Yeni Varlık' }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">
        <i class="bi bi-archive me-2 text-primary"></i>
        {{ 'Varlığı Düzenle' if asset else 'Yeni Varlık Ekle' }}
    </h4>
    <a href="{{ url_for('assets.index') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Geri
    </a>
</div>

<div class="card" style="max-width: 680px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Varlık Adı <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control"
                       value="{{ asset.name if asset else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Açıklama</label>
                <textarea name="description" class="form-control" rows="3">{{ asset.description if asset else '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Kategori</label>
                    <select name="category" class="form-select">
                        <option value="">Seçiniz...</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {{ 'selected' if asset and asset.category == cat }}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Sınıflandırma</label>
                    <select name="classification" class="form-select">
                        {% for cls in classifications %}
                        <option value="{{ cls }}" {{ 'selected' if asset and asset.classification == cls }}>{{ cls }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Varlık Sahibi</label>
                <input type="text" name="owner" class="form-control"
                       value="{{ asset.owner if asset else '' }}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>{{ 'Güncelle' if asset else 'Kaydet' }}
                </button>
                <a href="{{ url_for('assets.index') }}" class="btn btn-outline-secondary">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
