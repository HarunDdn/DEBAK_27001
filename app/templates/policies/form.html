{% extends "base.html" %}
{% block title %}{{ 'Politika Düzenle' if policy else 'Yeni Politika' }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">
        <i class="bi bi-file-text me-2 text-secondary"></i>
        {{ 'Politikayı Düzenle' if policy else 'Yeni Politika Ekle' }}
    </h4>
    <a href="{{ url_for('policies.index') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Geri
    </a>
</div>

<div class="card" style="max-width: 780px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Politika Başlığı <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control"
                       value="{{ policy.title if policy else '' }}" required>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-semibold">Sürüm</label>
                    <input type="text" name="version" class="form-control"
                           value="{{ policy.version if policy else '1.0' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-semibold">Durum</label>
                    <select name="status" class="form-select">
                        {% for s in statuses %}
                        <option value="{{ s }}" {{ 'selected' if policy and policy.status == s }}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-semibold">Sorumlu</label>
                    <input type="text" name="owner" class="form-control"
                           value="{{ policy.owner if policy else '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Politika İçeriği</label>
                <textarea name="content" class="form-control" rows="12">{{ policy.content if policy else '' }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-secondary">
                    <i class="bi bi-check-lg me-1"></i>{{ 'Güncelle' if policy else 'Kaydet' }}
                </button>
                <a href="{{ url_for('policies.index') }}" class="btn btn-outline-secondary">İptal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
